<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC Analytics">
<meta name="theme-color" content="#0a0a0f">
<title>BTC On-Chain Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --bg2:      #111118;
    --card:     #16161f;
    --border:   #242432;
    --orange:   #f7931a;
    --orange2:  #ff6b35;
    --white:    #f0f0f5;
    --muted:    #6b6b85;
    --green:    #00e676;
    --red:      #ff4757;
    --blue:     #4a9eff;
    --purple:   #bc8cff;
    --safe:     env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe) + 12px) 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #000;
  }

  .logo-text { font-size: 15px; font-weight: 800; letter-spacing: 0.5px; }
  .logo-sub  { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .refresh-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:active { transform: scale(0.95); background: var(--border); }
  .refresh-btn.loading { color: var(--orange); border-color: var(--orange); }

  /* ── Nav tabs ── */
  .nav {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .nav::-webkit-scrollbar { display: none; }

  .nav-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .nav-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #000;
    font-weight: 700;
  }

  /* ── Content ── */
  .content {
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Price hero ── */
  .price-hero {
    background: linear-gradient(135deg, #16161f 0%, #1a1a28 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .price-hero::before {
    content: '₿';
    position: absolute;
    right: -10px; top: -20px;
    font-size: 120px;
    color: rgba(247,147,26,0.06);
    font-weight: 800;
    pointer-events: none;
  }

  .price-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .price-main {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 12px;
  }

  .price-change {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
  }
  .price-change.up   { background: rgba(0,230,118,0.15); color: var(--green); }
  .price-change.down { background: rgba(255,71,87,0.15);  color: var(--red); }

  .price-meta {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .price-meta-item { flex: 1; }
  .price-meta-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .price-meta-value { font-size: 13px; font-weight: 600; }

  /* ── KPI Grid ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    transition: transform 0.15s;
  }
  .kpi-card:active { transform: scale(0.97); }

  .kpi-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
  }

  /* ── Section ── */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(36,36,50,0.5);
  }
  .metric-row:last-child { border-bottom: none; padding-bottom: 0; }
  .metric-row:first-child { padding-top: 0; }

  .metric-key   { font-size: 13px; color: var(--muted); }
  .metric-val   { font-size: 14px; font-weight: 700; font-family: 'Space Mono', monospace; }

  /* ── Fee gauge ── */
  .fee-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 4px;
  }

  .fee-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }
  .fee-box-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; font-family: 'Space Mono', monospace; }
  .fee-box-val   { font-size: 20px; font-weight: 800; }
  .fee-box-unit  { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── Signal badge colors ── */
  .sig-red    { background: rgba(255,71,87,0.2);   color: var(--red); }
  .sig-yellow { background: rgba(255,214,0,0.15);  color: #ffd600; }
  .sig-green  { background: rgba(0,230,118,0.15);  color: var(--green); }
  .sig-purple { background: rgba(188,140,255,0.15); color: var(--purple); }
  .sig-muted  { background: rgba(107,107,133,0.15); color: var(--muted); }

  /* ── Loading / Error ── */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--red);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  /* ── Updated ── */
  .updated-bar {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 8px;
    letter-spacing: 1px;
  }

  /* ── Big number ── */
  .big-num { font-size: 32px; font-weight: 800; }
  .small   { font-size: 11px; color: var(--muted); }

  /* ── Alert item ── */
  .alert-item {
    background: rgba(255,71,87,0.08);
    border: 1px solid rgba(255,71,87,0.2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .alert-sev  { font-size: 11px; font-weight: 700; color: var(--red); margin-bottom: 4px; font-family: 'Space Mono', monospace; }
  .alert-msg  { font-size: 13px; }
  .alert-none { text-align: center; padding: 30px; color: var(--green); font-family: 'Space Mono', monospace; font-size: 13px; }

  /* ── Install banner ── */
  .install-banner {
    background: linear-gradient(135deg, rgba(247,147,26,0.15), rgba(247,147,26,0.05));
    border: 1px solid rgba(247,147,26,0.3);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--orange);
  }
  .install-banner-icon { font-size: 20px; flex-shrink: 0; }
  .install-banner-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">₿</div>
    <div>
      <div class="logo-text">BTC Analytics</div>
      <div class="logo-sub">ON-CHAIN</div>
    </div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
</div>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard')">Dashboard</button>
  <button class="nav-btn" onclick="showTab('onchain')">On-Chain</button>
  <button class="nav-btn" onclick="showTab('mempool')">Mempool</button>
  <button class="nav-btn" onclick="showTab('alerts')">Alertes</button>
</div>

<!-- Content -->
<div class="content">

  <!-- Install banner iOS -->
  <div class="install-banner" id="installBanner" style="display:none">
    <span class="install-banner-icon">📲</span>
    <span>Ajoute cette app à ton écran d'accueil : <strong>Partager → Sur l'écran d'accueil</strong></span>
    <button class="install-banner-close" onclick="this.parentElement.style.display='none'">×</button>
  </div>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="screen active">
    <div id="dashboard-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        Chargement des données...
      </div>
    </div>
  </div>

  <!-- ON-CHAIN -->
  <div id="tab-onchain" class="screen">
    <div id="onchain-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        Chargement...
      </div>
    </div>
  </div>

  <!-- MEMPOOL -->
  <div id="tab-mempool" class="screen">
    <div id="mempool-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        Chargement...
      </div>
    </div>
  </div>

  <!-- ALERTES -->
  <div id="tab-alerts" class="screen">
    <div id="alerts-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        Chargement...
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://btc-onchain-analytics.vercel.app';
let DATA = null;

// ── Navigation ──
function showTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ── Formatters ──
function fmt(n, decimals=2) {
  if (n == null || n === undefined) return '—';
  return Number(n).toLocaleString('fr-FR', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}
function fmtPrice(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString('fr-FR', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}
function fmtBig(n) {
  if (n == null) return '—';
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return '$' + (n/1e6).toFixed(1) + 'M';
  return '$' + n.toFixed(0);
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function signalClass(signal) {
  if (!signal || signal === '—') return 'sig-muted';
  if (signal.includes('🔴')) return 'sig-red';
  if (signal.includes('🟡')) return 'sig-yellow';
  if (signal.includes('🟢')) return 'sig-green';
  if (signal.includes('💜')) return 'sig-purple';
  return 'sig-muted';
}

// ── Render Dashboard ──
function renderDashboard(d) {
  const change = d.price_change_1d;
  const changeClass = change >= 0 ? 'up' : 'down';
  const changeSign  = change >= 0 ? '▲' : '▼';

  return `
    <div class="price-hero">
      <div class="price-label">Bitcoin · BTC/USD</div>
      <div class="price-main">${fmtPrice(d.price_usd)}</div>
      <div class="price-change ${changeClass}">
        ${changeSign} ${Math.abs(change || 0).toFixed(2)}% <span style="opacity:0.6;font-size:11px">24h</span>
      </div>
      <div class="price-meta">
        <div class="price-meta-item">
          <div class="price-meta-label">Market Cap</div>
          <div class="price-meta-value">${fmtBig(d.market_cap)}</div>
        </div>
        <div class="price-meta-item">
          <div class="price-meta-label">Volume 24h</div>
          <div class="price-meta-value">${fmtBig(d.volume_usd)}</div>
        </div>
        <div class="price-meta-item">
          <div class="price-meta-label">Hashrate</div>
          <div class="price-meta-value">${d.hashrate_eh ? d.hashrate_eh.toFixed(0)+' EH/s' : '—'}</div>
        </div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">MVRV</div>
        <div class="kpi-value" style="color:var(--orange)">${d.mvrv ? fmt(d.mvrv, 2) : '—'}</div>
        <span class="kpi-badge ${signalClass(d.mvrv_signal)}">${d.mvrv_signal || '—'}</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">NUPL</div>
        <div class="kpi-value" style="color:var(--blue)">${d.nupl ? fmt(d.nupl, 3) : '—'}</div>
        <span class="kpi-badge ${signalClass(d.nupl_zone)}">${d.nupl_zone || '—'}</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Fees (rapide)</div>
        <div class="kpi-value" style="color:var(--green)">${d.fee_high || '—'}</div>
        <span class="kpi-badge sig-muted">sat/vB</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Mempool</div>
        <div class="kpi-value" style="color:var(--purple)">${d.pending_txs ? Math.round(d.pending_txs/1000)+'k' : '—'}</div>
        <span class="kpi-badge sig-muted">TXs en attente</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Réseau</div>
      <div class="metric-row">
        <span class="metric-key">Hashrate</span>
        <span class="metric-val">${d.hashrate_eh ? d.hashrate_eh.toFixed(1)+' EH/s' : '—'}</span>
      </div>
      <div class="metric-row">
        <span class="metric-key">Mempool (MB)</span>
        <span class="metric-val">${d.pending_mb ? d.pending_mb.toFixed(1)+' MB' : '—'}</span>
      </div>
      <div class="metric-row">
        <span class="metric-key">TXs en attente</span>
        <span class="metric-val">${d.pending_txs ? Number(d.pending_txs).toLocaleString('fr-FR') : '—'}</span>
      </div>
    </div>

    <div class="updated-bar">Mis à jour à ${fmtTime(d.updated_at)}</div>
  `;
}

// ── Render On-Chain ──
function renderOnchain(d) {
  return `
    <div class="section">
      <div class="section-title">Valorisation</div>
      <div class="metric-row">
        <span class="metric-key">MVRV Ratio</span>
        <div style="text-align:right">
          <div class="metric-val">${d.mvrv ? fmt(d.mvrv, 3) : '—'}</div>
          <span class="kpi-badge ${signalClass(d.mvrv_signal)}" style="font-size:10px">${d.mvrv_signal || '—'}</span>
        </div>
      </div>
      <div class="metric-row">
        <span class="metric-key">NUPL</span>
        <div style="text-align:right">
          <div class="metric-val">${d.nupl ? fmt(d.nupl, 4) : '—'}</div>
          <span class="kpi-badge ${signalClass(d.nupl_zone)}" style="font-size:10px">${d.nupl_zone || '—'}</span>
        </div>
      </div>
      <div class="metric-row">
        <span class="metric-key">Realized Cap</span>
        <span class="metric-val">${fmtBig(d.realized_cap)}</span>
      </div>
      <div class="metric-row">
        <span class="metric-key">NVT Signal</span>
        <span class="metric-val">${d.nvt ? fmt(d.nvt, 1) : '—'}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Guide de lecture MVRV</div>
      ${[
        ['< 1.0', 'Sous-évalué', 'sig-purple'],
        ['1.0 – 2.5', 'Zone neutre', 'sig-green'],
        ['2.5 – 3.5', 'Zone chaude', 'sig-yellow'],
        ['> 3.5', 'Surachat', 'sig-red'],
      ].map(([range, label, cls]) => `
        <div class="metric-row">
          <span class="metric-key" style="font-family:'Space Mono',monospace;font-size:12px">${range}</span>
          <span class="kpi-badge ${cls}">${label}</span>
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="section-title">Guide de lecture NUPL</div>
      ${[
        ['< 0', 'Capitulation', 'sig-purple'],
        ['0 – 0.25', 'Espoir', 'sig-green'],
        ['0.25 – 0.50', 'Optimisme', 'sig-green'],
        ['0.50 – 0.75', 'Avidité', 'sig-yellow'],
        ['> 0.75', 'Euphorie', 'sig-red'],
      ].map(([range, label, cls]) => `
        <div class="metric-row">
          <span class="metric-key" style="font-family:'Space Mono',monospace;font-size:12px">${range}</span>
          <span class="kpi-badge ${cls}">${label}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Render Mempool ──
function renderMempool(d) {
  return `
    <div class="section">
      <div class="section-title">Frais recommandés</div>
      <div class="fee-grid">
        <div class="fee-box">
          <div class="fee-box-label">Rapide</div>
          <div class="fee-box-val" style="color:var(--green)">${d.fee_high || '—'}</div>
          <div class="fee-box-unit">sat/vB</div>
        </div>
        <div class="fee-box">
          <div class="fee-box-label">Moyen</div>
          <div class="fee-box-val" style="color:var(--orange)">${d.fee_med || '—'}</div>
          <div class="fee-box-unit">sat/vB</div>
        </div>
        <div class="fee-box">
          <div class="fee-box-label">Lent</div>
          <div class="fee-box-val" style="color:var(--muted)">${d.fee_low || '—'}</div>
          <div class="fee-box-unit">sat/vB</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">État du mempool</div>
      <div class="metric-row">
        <span class="metric-key">TXs en attente</span>
        <span class="metric-val">${d.pending_txs ? Number(d.pending_txs).toLocaleString('fr-FR') : '—'}</span>
      </div>
      <div class="metric-row">
        <span class="metric-key">Taille</span>
        <span class="metric-val">${d.pending_mb ? d.pending_mb.toFixed(2)+' MB' : '—'}</span>
      </div>
      <div class="metric-row">
        <span class="metric-key">Hashrate réseau</span>
        <span class="metric-val">${d.hashrate_eh ? d.hashrate_eh.toFixed(1)+' EH/s' : '—'}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Interprétation des fees</div>
      ${[
        ['1-3 sat/vB', 'Réseau peu chargé ✅', 'sig-green'],
        ['4-10 sat/vB', 'Charge modérée', 'sig-yellow'],
        ['> 20 sat/vB', 'Réseau congestionné', 'sig-red'],
      ].map(([range, label, cls]) => `
        <div class="metric-row">
          <span class="metric-key" style="font-family:'Space Mono',monospace;font-size:11px">${range}</span>
          <span class="kpi-badge ${cls}">${label}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Render Alertes ──
function renderAlerts(d) {
  const alerts = d.alerts || [];
  if (alerts.length === 0) {
    return `
      <div class="section">
        <div class="section-title">Alertes actives</div>
        <div class="alert-none">✅ Aucune anomalie détectée<br><span style="color:var(--muted);font-size:11px;margin-top:8px;display:block">Toutes les métriques sont dans leurs zones normales</span></div>
      </div>
      <div class="section">
        <div class="section-title">Seuils de surveillance</div>
        ${[
          ['MVRV > 3.5', 'Surachat extrême', 'sig-red'],
          ['MVRV < 1.0', 'Sous-évalué', 'sig-purple'],
          ['NUPL > 0.75', 'Euphorie', 'sig-red'],
          ['NUPL < 0', 'Capitulation', 'sig-purple'],
          ['Fees > 50 sat/vB', 'Réseau saturé', 'sig-yellow'],
        ].map(([condition, label, cls]) => `
          <div class="metric-row">
            <span class="metric-key" style="font-family:'Space Mono',monospace;font-size:11px">${condition}</span>
            <span class="kpi-badge ${cls}">${label}</span>
          </div>
        `).join('')}
      </div>
    `;
  }
  return `
    <div class="section">
      <div class="section-title">Alertes actives (${alerts.length})</div>
      ${alerts.map(a => `
        <div class="alert-item">
          <div class="alert-sev">${a.severity || 'ALERTE'}</div>
          <div class="alert-msg">${a.message || a.metric || JSON.stringify(a)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Load data ──
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = '⟳ Chargement';

  try {
    const res = await fetch(API + '/api/summary');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();

    document.getElementById('dashboard-content').innerHTML = renderDashboard(DATA);
    document.getElementById('onchain-content').innerHTML   = renderOnchain(DATA);
    document.getElementById('mempool-content').innerHTML   = renderMempool(DATA);
    document.getElementById('alerts-content').innerHTML    = renderAlerts(DATA);

    btn.textContent = '✓ OK';
    setTimeout(() => { btn.textContent = '↻ Refresh'; btn.classList.remove('loading'); }, 1500);

  } catch (err) {
    const errHtml = `<div class="error-state">❌ Erreur de connexion<br><br><span style="font-size:11px;color:var(--muted)">${err.message}</span><br><br><button onclick="loadData()" style="margin-top:12px;padding:10px 20px;background:var(--orange);border:none;border-radius:8px;color:#000;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace">Réessayer</button></div>`;
    ['dashboard','onchain','mempool','alerts'].forEach(t => {
      document.getElementById(t+'-content').innerHTML = errHtml;
    });
    btn.textContent = '↻ Refresh';
    btn.classList.remove('loading');
  }
}

// ── iOS install banner ──
function checkInstallBanner() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    document.getElementById('installBanner').style.display = 'flex';
  }
}

// ── Auto-refresh toutes les 5 minutes ──
loadData();
checkInstallBanner();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>

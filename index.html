<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC Analytics">
<meta name="theme-color" content="#0a0a0f">
<title>BTC On-Chain Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--card:#16161f;--border:#242432;--orange:#f7931a;--white:#f0f0f5;--muted:#6b6b85;--green:#00e676;--red:#ff4757;--blue:#4a9eff;--purple:#bc8cff;--yellow:#ffd600}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#000}
.logo-text{font-size:15px;font-weight:800}
.logo-sub{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace}
.hright{display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--white);padding:7px 12px;border-radius:8px;font-size:13px;font-family:'Space Mono',monospace;cursor:pointer}
.refresh-btn.spin{color:var(--orange);border-color:var(--orange)}
.nav{display:flex;gap:4px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border)}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-btn.active{background:var(--orange);border-color:var(--orange);color:#000;font-weight:700}
.content{padding:12px;max-width:600px;margin:0 auto;padding-bottom:40px}
.screen{display:none}
.screen.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Hero */
.hero{background:linear-gradient(135deg,#16161f,#1a1a28);border:1px solid var(--border);border-radius:20px;padding:20px 18px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'₿';position:absolute;right:-8px;top:-18px;font-size:100px;color:rgba(247,147,26,0.05);font-weight:800;pointer-events:none}
.price-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.price-main{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:8px}
.changes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.up{background:rgba(0,230,118,0.15);color:var(--green)}
.down{background:rgba(255,71,87,0.15);color:var(--red)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);padding-top:12px}
.pi{text-align:center;padding:0 4px;border-right:1px solid var(--border)}
.pi:last-child{border-right:none}
.pi-l{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase}
.pi-v{font-size:12px;font-weight:700}
.bar-wrap{margin-top:12px}
.bar-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:4px}
.bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s ease}

/* Fear & Greed */
.fg-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:16px}
.fg-gauge{width:72px;height:72px;flex-shrink:0;position:relative}
.fg-gauge svg{transform:rotate(-90deg)}
.fg-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fg-num{font-size:22px;font-weight:800;font-family:'Space Mono',monospace;line-height:1}
.fg-info{flex:1}
.fg-ttl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.fg-lbl{font-size:17px;font-weight:800;margin-bottom:5px}
.fg-hist{display:flex;gap:3px;margin-top:5px}
.fg-dot{width:18px;height:4px;border-radius:2px;opacity:0.8}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px}
.kpi-l{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.kpi-v{font-size:22px;font-weight:800;line-height:1;margin-bottom:5px}
.kpi-sub{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:3px}

/* Badges */
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-family:'Space Mono',monospace;font-weight:700}
.sig-red{background:rgba(255,71,87,0.2);color:var(--red)}
.sig-yellow{background:rgba(255,214,0,0.15);color:var(--yellow)}
.sig-green{background:rgba(0,230,118,0.15);color:var(--green)}
.sig-purple{background:rgba(188,140,255,0.15);color:var(--purple)}
.sig-muted{background:rgba(107,107,133,0.15);color:var(--muted)}
.sig-blue{background:rgba(74,158,255,0.15);color:var(--blue)}
.sig-orange{background:rgba(247,147,26,0.15);color:var(--orange)}

/* Section */
.sec{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.sec-t{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(36,36,50,0.5)}
.row:last-child{border-bottom:none;padding-bottom:0}
.row:first-child{padding-top:0}
.rk{font-size:12px;color:var(--muted)}
.rv{font-size:12px;font-weight:700;font-family:'Space Mono',monospace;text-align:right}

/* MA bars */
.ma-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(36,36,50,0.5)}
.ma-row:last-child{border-bottom:none}
.ma-left{font-size:12px;color:var(--muted)}
.ma-right{text-align:right}
.ma-val{font-size:12px;font-weight:700;font-family:'Space Mono',monospace}
.ma-diff{font-size:10px;font-family:'Space Mono',monospace;margin-top:1px}

/* Fees */
.fee-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.fb{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.fb-l{font-size:9px;color:var(--muted);margin-bottom:4px;font-family:'Space Mono',monospace}
.fb-v{font-size:18px;font-weight:800}
.fb-u{font-size:9px;color:var(--muted);margin-top:1px}

/* Multi price */
.mp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.mp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.mp-l{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:4px}
.mp-v{font-size:14px;font-weight:800}

/* Stable pie */
.stable-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:10px 0 4px;gap:2px}
.stable-seg{border-radius:4px;transition:width 0.8s}

/* Diff bar */
.diff-wrap{margin:10px 0 4px}
.diff-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:4px}

/* Alerts */
.alert-item{background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.2);border-radius:10px;padding:12px;margin-bottom:8px}
.alert-sev{font-size:10px;font-weight:700;color:var(--red);margin-bottom:3px;font-family:'Space Mono',monospace}
.opp-item{background:rgba(188,140,255,0.08);border:1px solid rgba(188,140,255,0.2);border-radius:10px;padding:12px;margin-bottom:8px}
.opp-sev{font-size:10px;font-weight:700;color:var(--purple);margin-bottom:3px;font-family:'Space Mono',monospace}
.info-item{background:rgba(74,158,255,0.08);border:1px solid rgba(74,158,255,0.2);border-radius:10px;padding:12px;margin-bottom:8px}
.info-sev{font-size:10px;font-weight:700;color:var(--blue);margin-bottom:3px;font-family:'Space Mono',monospace}

/* Loading */
.loading{text-align:center;padding:50px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.updated{text-align:center;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);padding:8px;letter-spacing:1px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">₿</div>
    <div><div class="logo-text">BTC Analytics</div><div class="logo-sub">ON-CHAIN · LIVE</div></div>
  </div>
  <div class="hright">
    <div class="live-dot"></div>
    <button class="refresh-btn" id="btn" onclick="load()">↻</button>
  </div>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="tab('dash',this)">Dashboard</button>
  <button class="nav-btn" onclick="tab('onchain',this)">On-Chain</button>
  <button class="nav-btn" onclick="tab('tech',this)">Technique</button>
  <button class="nav-btn" onclick="tab('marche',this)">Marché</button>
  <button class="nav-btn" onclick="tab('reseau',this)">Réseau</button>
  <button class="nav-btn" onclick="tab('ln',this)">Lightning</button>
  <button class="nav-btn" onclick="tab('alertes',this)">Alertes</button>
</div>
<div class="content">
  <div id="tab-dash" class="screen active"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  <div id="tab-onchain" class="screen"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  <div id="tab-tech" class="screen"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  <div id="tab-marche" class="screen"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  <div id="tab-reseau" class="screen"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  <div id="tab-ln" class="screen"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  <div id="tab-alertes" class="screen"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
</div>
<script>
const API='https://btc-onchain-analytics.vercel.app';
let D=null;

function tab(n,b){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  if(b)b.classList.add('active');
}

const p=(n,d=2)=>n==null?'—':Number(n).toLocaleString('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d});
const $=(n)=>n==null?'—':'$'+Number(n).toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0});
const B=(n)=>{if(n==null)return'—';if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';return'$'+n.toFixed(0)};
const N=(n)=>n==null?'—':Number(n).toLocaleString('fr-FR');
const T=(iso)=>iso?new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'—';
const pct=(v,sfx='%')=>v==null?'—':(v>=0?'+':'')+v.toFixed(2)+sfx;
const col=(v)=>v==null?'':v>=0?'var(--green)':'var(--red)';
const chg=(v,l='')=>v==null?'—':`<span style="color:${col(v)}">${v>=0?'▲':'▼'}${Math.abs(v).toFixed(2)}%${l?' <span style="opacity:0.6;font-size:10px">'+l+'</span>':''}</span>`;

function sc(s){
  if(!s||s==='—')return'sig-muted';
  if(s.includes('🔴'))return'sig-red';
  if(s.includes('🟡')||s.includes('⚠️'))return'sig-yellow';
  if(s.includes('🟢')||s.includes('✅'))return'sig-green';
  if(s.includes('💜'))return'sig-purple';
  return'sig-muted';
}
function fgC(v){
  if(v<=20)return'#bc8cff';
  if(v<=40)return'#ffd600';
  if(v<=60)return'#4a9eff';
  if(v<=80)return'#f7931a';
  return'#ff4757';
}

function renderDash(d){
  const c1=d.price_change_1d,c7=d.price_change_7d,c30=d.price_change_30d;
  const ap=d.ath_pct,bw=ap?Math.min(98,Math.max(2,100-Math.abs(ap))):0;
  const fg=d.fear_greed_value,fc=fg!=null?fgC(fg):'var(--muted)';
  const fgH=d.fear_greed_history_7d||[];
  return`
<div class="hero">
  <div class="price-label">Bitcoin · BTC / USD</div>
  <div class="price-main">${$(d.price_usd)}</div>
  <div class="changes">
    <span class="chip ${(c1||0)>=0?'up':'down'}">${(c1||0)>=0?'▲':'▼'}${Math.abs(c1||0).toFixed(2)}% <span style="opacity:0.6">24h</span></span>
    ${c7!=null?`<span class="chip ${c7>=0?'up':'down'}">${c7>=0?'▲':'▼'}${Math.abs(c7).toFixed(2)}% <span style="opacity:0.6">7j</span></span>`:''}
    ${c30!=null?`<span class="chip ${c30>=0?'up':'down'}">${c30>=0?'▲':'▼'}${Math.abs(c30).toFixed(2)}% <span style="opacity:0.6">30j</span></span>`:''}
  </div>
  <div class="pgrid">
    <div class="pi"><div class="pi-l">Market Cap</div><div class="pi-v">${B(d.market_cap)}</div></div>
    <div class="pi"><div class="pi-l">Dominance</div><div class="pi-v">${d.btc_dominance?d.btc_dominance.toFixed(1)+'%':'—'}</div></div>
    <div class="pi"><div class="pi-l">ATH</div><div class="pi-v">${$(d.ath_usd)}</div></div>
  </div>
  ${ap!=null?`<div class="bar-wrap"><div class="bar-labels"><span>Bas</span><span style="color:var(--orange)">${d.ath_signal||''} · ${Math.abs(ap).toFixed(1)}% sous ATH</span><span>ATH</span></div><div class="bar-bg"><div class="bar-fill" style="width:${bw}%;background:linear-gradient(90deg,var(--purple),var(--blue),var(--orange))"></div></div></div>`:''}
</div>

${fg!=null?`
<div class="fg-card">
  <div class="fg-gauge">
    <svg width="72" height="72" viewBox="0 0 72 72"><circle cx="36" cy="36" r="30" fill="none" stroke="var(--border)" stroke-width="7" stroke-dasharray="188 251"/><circle cx="36" cy="36" r="30" fill="none" stroke="${fc}" stroke-width="7" stroke-dasharray="${(fg/100)*188} 251" stroke-linecap="round"/></svg>
    <div class="fg-center"><div class="fg-num" style="color:${fc}">${Math.round(fg)}</div></div>
  </div>
  <div class="fg-info">
    <div class="fg-ttl">Fear & Greed Index</div>
    <div class="fg-lbl" style="color:${fc}">${d.fear_greed_classification||'—'}</div>
    ${fgH.length>0?`<div class="fg-hist">${fgH.slice().reverse().map(h=>`<div class="fg-dot" style="background:${fgC(h.value)}" title="${h.value}: ${h.classification}"></div>`).join('')}</div><div style="font-size:9px;color:var(--muted);margin-top:3px;font-family:'Space Mono',monospace">7 derniers jours →</div>`:''}
  </div>
</div>`:''}

<div class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-l">MVRV Ratio</div>
    <div class="kpi-v" style="color:var(--orange)">${d.mvrv?p(d.mvrv,3):'—'}</div>
    <span class="badge ${sc(d.mvrv_signal)}">${d.mvrv_signal||'—'}</span>
  </div>
  <div class="kpi-card">
    <div class="kpi-l">NUPL</div>
    <div class="kpi-v" style="color:var(--blue)">${d.nupl!=null?p(d.nupl,3):'—'}</div>
    <span class="badge ${sc(d.nupl_zone)}">${d.nupl_zone||'—'}</span>
  </div>
  <div class="kpi-card">
    <div class="kpi-l">RSI 14j</div>
    <div class="kpi-v" style="color:var(--yellow)">${d.rsi_14?p(d.rsi_14,1):'—'}</div>
    <span class="badge ${sc(d.rsi_signal)}">${d.rsi_signal||'—'}</span>
  </div>
  <div class="kpi-card">
    <div class="kpi-l">Sharpe 30j</div>
    <div class="kpi-v" style="color:${(d.sharpe_30d||0)>=0?'var(--green)':'var(--red)'}">${d.sharpe_30d!=null?p(d.sharpe_30d,2):'—'}</div>
    <span class="badge ${sc(d.sharpe_signal)}">${d.sharpe_signal||'—'}</span>
  </div>
</div>

<div class="sec">
  <div class="sec-t">Réseau Bitcoin</div>
  <div class="row"><span class="rk">Hashrate</span><span class="rv">${d.hashrate_eh?d.hashrate_eh.toFixed(1)+' EH/s':'—'}</span></div>
  <div class="row"><span class="rk">Adresses actives</span><span class="rv">${d.active_addresses?N(Math.round(d.active_addresses)):'—'}</span></div>
  <div class="row"><span class="rk">TXs 24h</span><span class="rv">${d.tx_24h?N(d.tx_24h):'—'}</span></div>
  <div class="row"><span class="rk">NVT Signal</span><span class="rv">${d.nvt?p(d.nvt,1):'—'}</span></div>
  <div class="row"><span class="rk">Fees rapide</span><span class="rv"><span class="badge ${sc(d.fee_signal)}">${d.fee_high||'—'} sat/vB</span></span></div>
</div>
<div class="updated">Mis à jour ${T(d.updated_at)} · Auto-refresh 5min</div>`;
}

function renderOnchain(d){
  const fg=d.fear_greed_value;
  const mvrv=d.lth_mvrv_proxy,sth=d.sth_mvrv_proxy;
  return`
<div class="sec">
  <div class="sec-t">Métriques On-Chain</div>
  <div class="row"><span class="rk">MVRV Ratio</span><div style="text-align:right"><div class="rv">${d.mvrv?p(d.mvrv,4):'—'}</div><span class="badge ${sc(d.mvrv_signal)} " style="margin-top:2px">${d.mvrv_signal||'—'}</span></div></div>
  <div class="row"><span class="rk">NUPL</span><div style="text-align:right"><div class="rv">${d.nupl!=null?p(d.nupl,4):'—'}</div><span class="badge ${sc(d.nupl_zone)}">${d.nupl_zone||'—'}</span></div></div>
  <div class="row"><span class="rk">NVT Signal</span><span class="rv">${d.nvt?p(d.nvt,2):'—'}</span></div>
  <div class="row"><span class="rk">NVT 90j</span><span class="rv">${d.nvt_signal_90?p(d.nvt_signal_90,2):'—'}</span></div>
  <div class="row"><span class="rk">Adresses actives</span><span class="rv">${d.active_addresses?N(Math.round(d.active_addresses)):'—'}</span></div>
  <div class="row"><span class="rk">Volume on-chain</span><span class="rv">${d.volume_onchain_usd?B(d.volume_onchain_usd):'—'}</span></div>
  <div class="row"><span class="rk">Supply active 30j</span><span class="rv">${d.supply_active_30d?p(d.supply_active_30d,0)+' BTC':'—'}</span></div>
  <div class="row"><span class="rk">Supply active 180j</span><span class="rv">${d.supply_active_180d?p(d.supply_active_180d,0)+' BTC':'—'}</span></div>
  <div class="row"><span class="rk">Supply active 1 an</span><span class="rv">${d.supply_active_1yr?p(d.supply_active_1yr,0)+' BTC':'—'}</span></div>
  <div class="row"><span class="rk">Source CoinMetrics</span><span class="rv" style="color:var(--muted);font-size:10px">${d.coinmetrics_date||'—'}</span></div>
</div>
<div class="sec">
  <div class="sec-t">LTH / STH Proxy (MA200 / MA30)</div>
  <div class="row"><span class="rk">LTH Realized Price proxy</span><span class="rv">${$(d.lth_realized_price_proxy)}</span></div>
  <div class="row"><span class="rk">STH Realized Price proxy</span><span class="rv">${$(d.sth_realized_price_proxy)}</span></div>

function renderAlertes(d){
  const alerts=d.alerts||[];
  const sevOrder={'CRITIQUE':0,'ATTENTION':1,'INFO':2,'OPPORTUNITÉ':3};
  const sorted=[...alerts].sort((a,b)=>(sevOrder[a.severity]||9)-(sevOrder[b.severity]||9));
  function itemClass(sev){
    if(sev==='CRITIQUE'||sev==='ATTENTION')return'alert-item';
    if(sev==='OPPORTUNITÉ')return'opp-item';
    return'info-item';
  }
  function sevClass(sev){
    if(sev==='CRITIQUE'||sev==='ATTENTION')return'alert-sev';
    if(sev==='OPPORTUNITÉ')return'opp-sev';
    return'info-sev';
  }
  return`
<div class="sec">
  <div class="sec-t">Alertes (${sorted.length})</div>
  ${sorted.length===0?`<div style="text-align:center;padding:24px;color:var(--green);font-family:'Space Mono',monospace;font-size:12px">✅ Aucune alerte<br><span style="color:var(--muted);font-size:10px;display:block;margin-top:6px">Toutes les métriques dans les zones normales</span></div>`:sorted.map(a=>`<div class="${itemClass(a.severity)}" style="margin-bottom:8px"><div class="${sevClass(a.severity)}">${a.severity} · ${a.metric}</div><div style="font-size:12px">${a.message}</div></div>`).join('')}
</div>
<div class="sec">
  <div class="sec-t">Surveillance</div>
  ${[
    ['Distance ATH', d.ath_signal||'—', sc(d.ath_signal)],
    ['MVRV', d.mvrv_signal||'—', sc(d.mvrv_signal)],
    ['NUPL', d.nupl_zone||'—', sc(d.nupl_zone)],
    ['Fear & Greed', (d.fear_greed_value!=null?`${Math.round(d.fear_greed_value)} — `:'')+(d.fear_greed_classification||'—'), sc(d.fg_signal)],
    ['RSI 14j', d.rsi_signal||'—', sc(d.rsi_signal)],
    ['Sharpe 30j', d.sharpe_signal||'—', sc(d.sharpe_signal)],
    ['Mempool', d.mempool_signal||'—', sc(d.mempool_signal)],
    ['Fees réseau', d.fee_signal||'—', sc(d.fee_signal)],
    ['Liquidité stables', d.stable_signal||'—', sc(d.stable_signal)],
  ].map(([k,v,c])=>`<div class="row"><span class="rk">${k}</span><span class="badge ${c}">${v}</span></div>`).join('')}

}

async function load(){
  const b=document.getElementById('btn');
  b.classList.add('spin');b.textContent='⟳';
  try{
    const [s,m]=await Promise.all([
      fetch(API+'/api/summary?t='+Date.now()).then(r=>r.json()),
      fetch(API+'/api/market?t='+Date.now()).then(r=>r.json()).catch(()=>({}))
    ]);
    D={...s,...m};
    document.getElementById('tab-dash').innerHTML=renderDash(D);
    document.getElementById('tab-onchain').innerHTML=renderOnchain(D);
    document.getElementById('tab-tech').innerHTML=renderTech(D);
    document.getElementById('tab-marche').innerHTML=renderMarche(D);
    document.getElementById('tab-reseau').innerHTML=renderReseau(D);
    document.getElementById('tab-ln').innerHTML=renderLN(D);
    document.getElementById('tab-alertes').innerHTML=renderAlertes(D);
    b.textContent='✓';setTimeout(()=>{b.textContent='↻';b.classList.remove('spin')},1500);
  }catch(e){
    const err=`<div style="text-align:center;padding:40px;color:var(--red);font-family:'Space Mono',monospace;font-size:12px">❌ ${e.message}<br><br><button onclick="load()" style="margin-top:10px;padding:10px 20px;background:var(--orange);border:none;border-radius:8px;color:#000;font-weight:700;cursor:pointer">Réessayer</button></div>`;
    ['dash','onchain','tech','marche','reseau','ln','alertes'].forEach(t=>document.getElementById('tab-'+t).innerHTML=err);
    b.textContent='↻';b.classList.remove('spin');
  }
}
load();
setInterval(load,5*60*1000);

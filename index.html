<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC Analytics">
<meta name="theme-color" content="#0a0a0f">
<title>BTC On-Chain Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --bg2:#111118; --card:#16161f; --border:#242432;
  --orange:#f7931a; --white:#f0f0f5; --muted:#6b6b85;
  --green:#00e676; --red:#ff4757; --blue:#4a9eff; --purple:#bc8cff; --yellow:#ffd600;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}

.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#000}
.logo-text{font-size:15px;font-weight:800}
.logo-sub{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--white);padding:8px 14px;border-radius:8px;font-size:12px;font-family:'Space Mono',monospace;cursor:pointer;transition:all 0.2s}
.refresh-btn:active{transform:scale(0.95)}
.refresh-btn.spin{color:var(--orange);border-color:var(--orange)}

.nav{display:flex;gap:4px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border)}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.nav-btn.active{background:var(--orange);border-color:var(--orange);color:#000;font-weight:700}

.content{padding:14px;max-width:600px;margin:0 auto;padding-bottom:40px}
.screen{display:none}
.screen.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Price Hero */
.price-hero{background:linear-gradient(135deg,#16161f,#1a1a28);border:1px solid var(--border);border-radius:20px;padding:24px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.price-hero::before{content:'₿';position:absolute;right:-10px;top:-20px;font-size:110px;color:rgba(247,147,26,0.06);font-weight:800;pointer-events:none}
.price-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.price-main{font-size:40px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:10px}
.price-change{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.up{background:rgba(0,230,118,0.15);color:var(--green)}
.down{background:rgba(255,71,87,0.15);color:var(--red)}
.price-row{display:flex;gap:0;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.price-item{flex:1;text-align:center;border-right:1px solid var(--border)}
.price-item:last-child{border-right:none}
.pi-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.pi-val{font-size:12px;font-weight:700}

/* Cards */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
.kpi-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:800;line-height:1;margin-bottom:6px}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-family:'Space Mono',monospace;font-weight:700}
.sig-red{background:rgba(255,71,87,0.2);color:var(--red)}
.sig-yellow{background:rgba(255,214,0,0.15);color:var(--yellow)}
.sig-green{background:rgba(0,230,118,0.15);color:var(--green)}
.sig-purple{background:rgba(188,140,255,0.15);color:var(--purple)}
.sig-muted{background:rgba(107,107,133,0.15);color:var(--muted)}
.sig-blue{background:rgba(74,158,255,0.15);color:var(--blue)}

/* Section */
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.sec-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(36,36,50,0.5)}
.mrow:last-child{border-bottom:none;padding-bottom:0}
.mrow:first-child{padding-top:0}
.mk{font-size:13px;color:var(--muted)}
.mv{font-size:13px;font-weight:700;font-family:'Space Mono',monospace;text-align:right}

/* Fees */
.fee-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.fee-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.fb-label{font-size:10px;color:var(--muted);margin-bottom:5px;font-family:'Space Mono',monospace}
.fb-val{font-size:22px;font-weight:800}
.fb-unit{font-size:10px;color:var(--muted);margin-top:2px}

/* Loading */
.loading{text-align:center;padding:50px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.updated{text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);padding:8px;letter-spacing:1px}

/* ATH bar */
.ath-bar-wrap{margin-top:12px}
.ath-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:5px}
.ath-bar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.ath-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--orange));transition:width 0.8s ease}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">₿</div>
    <div>
      <div class="logo-text">BTC Analytics</div>
      <div class="logo-sub">ON-CHAIN</div>
    </div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard',this)">Dashboard</button>
  <button class="nav-btn" onclick="showTab('marche',this)">Marché</button>
  <button class="nav-btn" onclick="showTab('mempool',this)">Mempool</button>
  <button class="nav-btn" onclick="showTab('alertes',this)">Alertes</button>
</div>

<div class="content">

  <div id="tab-dashboard" class="screen active">
    <div id="dash-content"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  </div>

  <div id="tab-marche" class="screen">
    <div id="marche-content"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  </div>

  <div id="tab-mempool" class="screen">
    <div id="mempool-content"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  </div>

  <div id="tab-alertes" class="screen">
    <div id="alertes-content"><div class="loading"><div class="spinner"></div>Chargement...</div></div>
  </div>

</div>

<script>
const API = 'https://btc-onchain-analytics.vercel.app';
let D = null;

function showTab(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

function fmt(n, d=2) {
  if (n == null) return '—';
  return Number(n).toLocaleString('fr-FR', {minimumFractionDigits:d, maximumFractionDigits:d});
}
function fmtP(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString('fr-FR', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtB(n) {
  if (n == null) return '—';
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return '$' + (n/1e6).toFixed(1) + 'M';
  return '$' + n.toFixed(0);
}
function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
function sigClass(sig) {
  if (!sig || sig === '—') return 'sig-muted';
  if (sig.includes('🔴')) return 'sig-red';
  if (sig.includes('🟡') || sig.includes('⚠️')) return 'sig-yellow';
  if (sig.includes('🟢') || sig.includes('✅')) return 'sig-green';
  if (sig.includes('💜')) return 'sig-purple';
  return 'sig-muted';
}

function renderDash(d) {
  const chg = d.price_change_1d;
  const chgClass = chg >= 0 ? 'up' : 'down';
  const chgSign  = chg >= 0 ? '▲' : '▼';
  const athPct   = d.ath_pct ? Math.abs(d.ath_pct) : null;
  const barWidth = athPct ? Math.min(100, Math.max(2, 100 - athPct)) : 0;

  return `
    <div class="price-hero">
      <div class="price-label">Bitcoin · BTC/USD</div>
      <div class="price-main">${fmtP(d.price_usd)}</div>
      <div class="price-change ${chgClass}">
        ${chgSign} ${Math.abs(chg||0).toFixed(2)}%
        <span style="opacity:0.6;font-size:10px">24h</span>
      </div>
      <div class="price-row">
        <div class="price-item">
          <div class="pi-label">Market Cap</div>
          <div class="pi-val">${fmtB(d.market_cap)}</div>
        </div>
        <div class="price-item">
          <div class="pi-label">Volume 24h</div>
          <div class="pi-val">${fmtB(d.volume_usd)}</div>
        </div>
        <div class="price-item">
          <div class="pi-label">7j</div>
          <div class="pi-val" style="color:${(d.price_change_7d||0)>=0?'var(--green)':'var(--red)'}">${d.price_change_7d ? (d.price_change_7d>0?'▲':'▼')+Math.abs(d.price_change_7d).toFixed(1)+'%' : '—'}</div>
        </div>
      </div>
      ${athPct != null ? `
      <div class="ath-bar-wrap">
        <div class="ath-bar-labels">
          <span>Bas historique</span>
          <span style="color:var(--orange)">${d.ath_signal || ''} (${athPct.toFixed(1)}% sous ATH)</span>
          <span>ATH ${fmtP(d.ath_usd)}</span>
        </div>
        <div class="ath-bar-bg">
          <div class="ath-bar-fill" style="width:${barWidth}%"></div>
        </div>
      </div>` : ''}
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Fees rapide</div>
        <div class="kpi-value" style="color:var(--green)">${d.fee_high || '—'}</div>
        <span class="badge ${sigClass(d.fee_signal)}">${d.fee_signal || 'sat/vB'}</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Mempool</div>
        <div class="kpi-value" style="color:var(--purple)">${d.pending_txs ? Math.round(d.pending_txs/1000)+'k' : '—'}</div>
        <span class="badge ${sigClass(d.mempool_signal)}">${d.mempool_signal || 'TXs'}</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Hashrate</div>
        <div class="kpi-value" style="color:var(--blue);font-size:18px">${d.hashrate_eh ? d.hashrate_eh.toFixed(0) : '—'}</div>
        <span class="badge sig-muted">EH/s</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Supply</div>
        <div class="kpi-value" style="color:var(--orange);font-size:18px">${d.circulating_supply ? (d.circulating_supply/1e6).toFixed(2)+'M' : '—'}</div>
        <span class="badge sig-muted">BTC en circ.</span>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">Réseau Bitcoin</div>
      <div class="mrow"><span class="mk">Hashrate</span><span class="mv">${d.hashrate_eh ? d.hashrate_eh.toFixed(1)+' EH/s' : '—'}</span></div>
      <div class="mrow"><span class="mk">Difficulté</span><span class="mv">${d.difficulty ? (d.difficulty/1e12).toFixed(2)+'T' : '—'}</span></div>
      <div class="mrow"><span class="mk">TXs mempool</span><span class="mv">${d.pending_txs ? Number(d.pending_txs).toLocaleString('fr-FR') : '—'}</span></div>
      <div class="mrow"><span class="mk">Taille mempool</span><span class="mv">${d.pending_mb ? d.pending_mb.toFixed(1)+' MB' : '—'}</span></div>
    </div>

    <div class="updated">Mis à jour à ${fmtTime(d.updated_at)} · Auto-refresh 5 min</div>
  `;
}

function renderMarche(d) {
  return `
    <div class="section">
      <div class="sec-title">Prix & Variations</div>
      <div class="mrow"><span class="mk">Prix actuel</span><span class="mv">${fmtP(d.price_usd)}</span></div>
      <div class="mrow"><span class="mk">Variation 24h</span><span class="mv" style="color:${(d.price_change_1d||0)>=0?'var(--green)':'var(--red)'}">${d.price_change_1d ? (d.price_change_1d>0?'+':'')+d.price_change_1d.toFixed(2)+'%' : '—'}</span></div>
      <div class="mrow"><span class="mk">Variation 7j</span><span class="mv" style="color:${(d.price_change_7d||0)>=0?'var(--green)':'var(--red)'}">${d.price_change_7d ? (d.price_change_7d>0?'+':'')+d.price_change_7d.toFixed(2)+'%' : '—'}</span></div>
      <div class="mrow"><span class="mk">Haut 24h</span><span class="mv">${fmtP(d.high_24h)}</span></div>
      <div class="mrow"><span class="mk">Bas 24h</span><span class="mv">${fmtP(d.low_24h)}</span></div>
      <div class="mrow"><span class="mk">ATH</span><span class="mv">${fmtP(d.ath_usd)}</span></div>
      <div class="mrow"><span class="mk">Distance ATH</span><span class="mv" style="color:var(--muted)">${d.ath_pct ? Math.abs(d.ath_pct).toFixed(1)+'% sous ATH' : '—'}</span></div>
    </div>

    <div class="section">
      <div class="sec-title">Market</div>
      <div class="mrow"><span class="mk">Market Cap</span><span class="mv">${fmtB(d.market_cap)}</span></div>
      <div class="mrow"><span class="mk">Volume 24h</span><span class="mv">${fmtB(d.volume_usd)}</span></div>
      <div class="mrow"><span class="mk">Supply circulant</span><span class="mv">${d.circulating_supply ? Number(d.circulating_supply).toLocaleString('fr-FR') : '—'}</span></div>
      <div class="mrow"><span class="mk">% miné</span><span class="mv">${d.circulating_supply ? ((d.circulating_supply/21000000)*100).toFixed(2)+'%' : '—'}</span></div>
    </div>

    <div class="section">
      <div class="sec-title">Signal ATH</div>
      ${[
        ['< 5% sous ATH','Proche sommet 🔴','sig-red'],
        ['5–20% sous ATH','Zone haute 🟡','sig-yellow'],
        ['20–50% sous ATH','Zone médiane 🟢','sig-green'],
        ['> 50% sous ATH','Zone basse 💜','sig-purple'],
      ].map(([r,l,c])=>`<div class="mrow"><span class="mk" style="font-family:'Space Mono',monospace;font-size:11px">${r}</span><span class="badge ${c}">${l}</span></div>`).join('')}
    </div>
  `;
}

function renderMempool(d) {
  return `
    <div class="section">
      <div class="sec-title">Frais recommandés</div>
      <div class="fee-grid">
        <div class="fee-box">
          <div class="fb-label">Rapide</div>
          <div class="fb-val" style="color:var(--green)">${d.fee_high||'—'}</div>
          <div class="fb-unit">sat/vB · ~10min</div>
        </div>
        <div class="fee-box">
          <div class="fb-label">Moyen</div>
          <div class="fb-val" style="color:var(--orange)">${d.fee_med||'—'}</div>
          <div class="fb-unit">sat/vB · ~30min</div>
        </div>
        <div class="fee-box">
          <div class="fb-label">Lent</div>
          <div class="fb-val" style="color:var(--muted)">${d.fee_low||'—'}</div>
          <div class="fb-unit">sat/vB · ~1h</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">État mempool</div>
      <div class="mrow"><span class="mk">TXs en attente</span><span class="mv">${d.pending_txs ? Number(d.pending_txs).toLocaleString('fr-FR') : '—'}</span></div>
      <div class="mrow"><span class="mk">Taille</span><span class="mv">${d.pending_mb ? d.pending_mb.toFixed(2)+' MB' : '—'}</span></div>
      <div class="mrow"><span class="mk">Signal</span><span class="mv"><span class="badge ${sigClass(d.mempool_signal)}">${d.mempool_signal||'—'}</span></span></div>
      <div class="mrow"><span class="mk">Fee minimum</span><span class="mv">${d.fee_minimum||'—'} sat/vB</span></div>
    </div>

    <div class="section">
      <div class="sec-title">Réseau minier</div>
      <div class="mrow"><span class="mk">Hashrate</span><span class="mv">${d.hashrate_eh ? d.hashrate_eh.toFixed(1)+' EH/s' : '—'}</span></div>
      <div class="mrow"><span class="mk">Difficulté</span><span class="mv">${d.difficulty ? (d.difficulty/1e12).toFixed(2)+'T' : '—'}</span></div>
    </div>

    <div class="section">
      <div class="sec-title">Interprétation fees</div>
      ${[['1–3 sat/vB','Réseau libre ✅','sig-green'],['4–15 sat/vB','Charge normale','sig-yellow'],['> 20 sat/vB','Congestionné 🔴','sig-red']].map(([r,l,c])=>`<div class="mrow"><span class="mk" style="font-family:'Space Mono',monospace;font-size:11px">${r}</span><span class="badge ${c}">${l}</span></div>`).join('')}
    </div>
  `;
}

function renderAlertes(d) {
  const alerts = d.alerts || [];
  const athPct = d.ath_pct ? Math.abs(d.ath_pct) : null;
  const fee = d.fee_high;
  const txs = d.pending_txs;

  let autoAlerts = [];
  if (athPct && athPct < 5)  autoAlerts.push({sev:'ATTENTION', msg:`BTC à seulement ${athPct.toFixed(1)}% de son ATH — zone de surachat historique`, cls:'sig-red'});
  if (fee && fee > 50)       autoAlerts.push({sev:'RÉSEAU', msg:`Fees très élevés : ${fee} sat/vB — réseau congestionné`, cls:'sig-red'});
  if (fee && fee > 20)       autoAlerts.push({sev:'INFO', msg:`Fees modérément élevés : ${fee} sat/vB`, cls:'sig-yellow'});
  if (txs && txs > 100000)   autoAlerts.push({sev:'RÉSEAU', msg:`Mempool saturé : ${Number(txs).toLocaleString('fr-FR')} TXs en attente`, cls:'sig-red'});

  const allAlerts = [...autoAlerts, ...alerts];

  return `
    <div class="section">
      <div class="sec-title">Alertes actives (${allAlerts.length})</div>
      ${allAlerts.length === 0 ? `
        <div style="text-align:center;padding:24px;color:var(--green);font-family:'Space Mono',monospace;font-size:12px">
          ✅ Aucune anomalie détectée<br>
          <span style="color:var(--muted);font-size:10px;margin-top:6px;display:block">Marché dans les zones normales</span>
        </div>
      ` : allAlerts.map(a=>`
        <div style="background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.2);border-radius:10px;padding:12px;margin-bottom:8px">
          <div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:4px;font-family:'Space Mono',monospace">${a.sev||'ALERTE'}</div>
          <div style="font-size:13px">${a.msg||a.message||''}</div>
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="sec-title">Surveillance continue</div>
      ${[
        ['Distance ATH', d.ath_signal||'—', sigClass(d.ath_signal)],
        ['Mempool',      d.mempool_signal||'—', sigClass(d.mempool_signal)],
        ['Fees réseau',  d.fee_signal||'—', sigClass(d.fee_signal)],
      ].map(([k,v,c])=>`<div class="mrow"><span class="mk">${k}</span><span class="badge ${c}">${v}</span></div>`).join('')}
    </div>
  `;
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  btn.textContent = '⟳';

  try {
    const res = await fetch(API + '/api/summary?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    D = await res.json();

    document.getElementById('dash-content').innerHTML    = renderDash(D);
    document.getElementById('marche-content').innerHTML  = renderMarche(D);
    document.getElementById('mempool-content').innerHTML = renderMempool(D);
    document.getElementById('alertes-content').innerHTML = renderAlertes(D);

    btn.textContent = '✓';
    setTimeout(()=>{ btn.textContent='↻ Refresh'; btn.classList.remove('spin'); }, 1500);
  } catch(err) {
    const e = `<div style="text-align:center;padding:40px;color:var(--red);font-family:'Space Mono',monospace;font-size:12px">❌ ${err.message}<br><br><button onclick="loadData()" style="margin-top:10px;padding:10px 20px;background:var(--orange);border:none;border-radius:8px;color:#000;font-weight:700;cursor:pointer">Réessayer</button></div>`;
    ['dash','marche','mempool','alertes'].forEach(t => document.getElementById(t+'-content').innerHTML = e);
    btn.textContent = '↻ Refresh';
    btn.classList.remove('spin');
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
